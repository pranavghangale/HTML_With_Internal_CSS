<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        .web {
            background-color: rgb(252, 250, 242);
        }

        .header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 90%;
            margin: auto;

        }

        .section1 {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 35px;
            font-weight: bold;
            /* margin-left: 12%; */
            width: 50%;
        }

        .section2 {
            width: 50%;
        }

        .link {
            display: flex;
            justify-content: center;
            font-size: 10px;
        }

        a {
            text-decoration: none;
            color: black;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            padding: 1%;
        }

        .btn {
            border-radius: 20px;
            background-color: black;
            color: white;
            width: 20%;
            padding: 3%;
        }

        .text {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 115px;
            margin-left: 11%;
            margin-top: 9%;
            margin-bottom: 0%;
        }

        .subtext {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 115px;
            margin-left: 11%;
            margin-top: -2.5%;
        }

        .msg {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 25px;
            margin-left: 11%;
            margin-top: 2%;
            margin-bottom: 0%;
        }

        .button {
            border-radius: 30px;
            background-color: black;
            color: white;
            width: 12%;
            padding: 1%;
            align-items: center;
            margin-left: 11%;
            margin-top: 3%;
            font-size: 20px;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        .img {
            height: 590px;
            margin-left: 70%;
            margin-top: -33%;
            margin-bottom: -2%;
        }
    </style>
</head>

<body class="web">
    <div class="header">
        <div class="section1">Medium</div>

        <div class="section2">
            <a href="#">Our story</a>
            <a href="#">Membership</a>
            <a href="#">Write</a>
            <a href="#">Sign in</a>
            <a href="#">Membership</a>
            <button class="btn">Get started</button>
        </div>
    </div>

    <hr>

    <div>
        <div class="text">Human</div>
        <div class="subtext">stories & ideas</div>
        <div class="msg">A place to read, write, and deepen your understanding</div>
        <div class="button">Start readings</div>

        <img src="https://miro.medium.com/v2/format:webp/4*SdjkdS98aKH76I8eD0_qjw.png" class="img">
    </div>
    </div>
    <hr>
    <div class="link">
        <a href="#">Helps</a>

        <a href="#">About</a>
