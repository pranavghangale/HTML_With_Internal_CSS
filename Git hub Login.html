<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Hub</title>
    <style>
        .header {
            width: 25%; margin: auto; justify-content: center; align-items: center; font-family: Arial, Helvetica, sans-serif; margin-top: 4%; font-size: 14px;
        }
        .git {
            height: 50px; justify-content: center; align-items: center; margin-left: 37%;
        }
        .sign {
            font-family: Arial, Helvetica, sans-serif; font-weight:600; font-size: 18px; justify-content: center; align-items: center; margin-left: 31%;
        }
        form {
            align-items: center; width: 100%; border: none; font-family: Arial, Helvetica, sans-serif; margin-top: 9%;
        }
        .username {
            border-radius: 5px;  font-size: 30px; border: 1px solid; border-color: rgb(199, 197, 197); margin-top: 2%;
        }
        .pass {
            border-radius: 5px;  font-size: 30px; border: 1px solid; border-color: rgb(199, 197, 197); margin-top: 2%;
        }
        .password {
            margin-left: 51%; font-weight: normal; text-decoration: none; color: rgb(27, 82, 145);
        }
        .signin{
            width: 99%; background-color: rgb(22, 135, 5); font-size: 15px; border-radius: 5px; color: white; padding: 3%; border: none;
        }
        .hor{
            width: 45%; margin-left: 0%;
        }
        .or {
            margin-top: -4.4%; margin-left: 48%;
        }
        .horizontal {
            width: 44%; margin-left: 54%; margin-top: -2.1%;
        }
        .Google {
            border-radius: 5px; border: 1px solid; width: 99%; border-color: rgb(199, 197, 197); margin-top: -3%;
        }
        .googlelogo {
            height: 15px; padding-top: 3.5%; margin-left: -38%;
        }
        .googlelogin {
            margin-top: -9%; margin-left: 8%; padding: 3.8%; font-weight: 600;
        }
        .Apple {
            border-radius: 5px; border: 1px solid; width: 99%; border-color: rgb(199, 197, 197); margin-top: -2%;
        }
        .Applelogo {
            height: 17px; padding-top: 3.5%; margin-left: -35%;
        }
        .Applelogin {
            margin-top: -9%; margin-left: 6%; padding: 3.7%; font-weight: 600;
        }
        .new{
            margin-left: 22%;
        }
        .AC {
            font-weight: normal; text-decoration: none; color: rgb(27, 82, 145);
        }
        .footer {
            background-color: rgb(244, 244, 244); display: flex; justify-content: center; align-items: center; margin-top: 2.6%; margin-left: 0%; margin-right: 0%; object-fit: cover; width: auto; padding: 0%; margin-bottom: 0%; border: none; border-radius: 0%;
        }
        .link {
            text-decoration: none; color: rgb(107, 106, 106); font-size: 11px; padding: 1.5%; font-family: Arial, Helvetica, sans-serif;
        }
        .passkey {
            text-decoration: none; color: rgb(31, 94, 176); font-size: 15px; justify-content: center; align-items: center; margin-left: 32%;
        }

    </style>
</head>
<body>
    <div class="header">
        <div>
        <img src="https://www.pngarts.com/files/8/Github-Logo-Transparent-Background-PNG.png" class="git"><br><br> 
        <div class="sign">Sign in to GitHub</div>


        <form>
        Username or Email address<br>
        <input type="text" class="username">

    <br><br>
        Password    <a href="#" class="password">Forgot Password?</a><br>
        <input type="password" class="pass">
        <br>
        <br>
        <button class="signin">Sign In</button>
        <br>
        <br>
        <hr class="hor"><div class="or">or</div><hr class="horizontal">
        <br>
        <br>
        <button class="Google"><img src="https://tse1.mm.bing.net/th/id/OIP.7aFwzaoZuyYDexTRuFM1AQHaHa?w=920&h=920&rs=1&pid=ImgDetMain&o=7&rm=3" class="googlelogo"><div class="googlelogin">Continue with Google</div></button>
        <br>
        <br>
        <button class="Apple"><img src="https://static.vecteezy.com/system/resources/previews/002/520/838/original/apple-logo-black-isolated-on-transparent-background-free-vector.jpg" class="Applelogo"><div class="Applelogin">Continue with Apple</div></button>
        <br>
        <br>
        <div class="new">New to GitHub? <a href="#" class="AC">Create an account</a></div>
        <br>
        
        <a href="#" class="passkey">Sign in with passkey</a>

        </form>
        </div>
    </div>
    <br>

    <div class="footer">
       <a href="#" class="link">Terms</a>
       <a href="#" class="link">Privacy</a> 
       <a href="#" class="link">Docs</a> 
       <a href="#" class="link">Contact Github Support</a> 
       <a href="#" class="link">Manage cookies</a> 
       <a href="#" class="link">Do not share my personal information</a>    
    </div>
</body>
</html>
